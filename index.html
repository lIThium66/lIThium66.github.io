<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Banana Welcome</title>
	<link rel="stylesheet" href="styles.css" />
</head>
<body>
	<div class="bg-shape bg-shape-left" aria-hidden="true"></div>
	<div class="bg-shape bg-shape-right" aria-hidden="true"></div>

	<main class="container">
		<section class="hero">
			<p class="eyebrow">Bello, friend!</p>
			<h1>Welcome to the Banana Zone</h1>
			<p class="lead">
				A playful Minions-inspired welcome page with bright colors, big smiles,
				and just the right amount of chaos.
			</p>
			<a class="cta" href="#gallery">Meet The Crew</a>
		</section>

		<section id="gallery" class="gallery-section">
			<h2>Minion Squad</h2>
			<div class="gallery">
				<figure class="tile">
					<img src="https://images.unsplash.com/photo-1584820927498-cfe5211fd8bf?auto=format&fit=crop&w=800&q=80" alt="Minion character close-up" loading="lazy" />
					<figcaption>Ready for mission</figcaption>
				</figure>
				<figure class="tile">
					<img src="https://images.unsplash.com/photo-1611605698335-8b1569810432?auto=format&fit=crop&w=800&q=80" alt="Two minion toys side by side" loading="lazy" />
					<figcaption>Banana partners</figcaption>
				</figure>
				<figure class="tile">
					<img src="https://images.unsplash.com/photo-1608889825271-9696287ab804?auto=format&fit=crop&w=800&q=80" alt="Minion figurine with blue overalls" loading="lazy" />
					<figcaption>Always cheerful</figcaption>
				</figure>
			</div>
		</section>
	</main>
</body>
</html>
